<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カンテレすごろく BATTLE - Pro Edition</title>
    <style>
        :root {
            --p1-color: #2ecc71;
            --p2-color: #ff4757;
            --p3-color: #a55eea;
            --p4-color: #45aaf2;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --event-color: #f39c12;
            --action-color: #3498db;
        }

        body { 
            display: flex; flex-direction: column; align-items: center; 
            padding: 20px; font-family: 'Helvetica Neue', Arial, sans-serif; 
            background-color: var(--bg-color); margin: 0; color: #333;
            overflow-x: hidden;
        }

        .screen { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 500px; z-index: 10; }
        .active { display: flex; }

        /* --- スタート画面アニメーション --- */
        #startScreen { height: 100vh; justify-content: center; position: relative; }
        .title-container { display: flex; gap: 8px; justify-content: center; margin-bottom: 10px; }
        .char {
            display: inline-block; font-size: 3.5rem; font-weight: 900;
            animation: bounceText 2s infinite ease-in-out;
            text-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        @keyframes bounceText {
            0%, 100% { transform: translateY(0) rotate(0deg); color: #333; }
            50% { transform: translateY(-20px) rotate(5deg); color: #2ecc71; }
        }

        .floating-tile {
            position: absolute; width: 40px; height: 40px; opacity: 0.15;
            z-index: -1; animation: float 15s infinite linear; border-radius: 8px;
        }
        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg); }
            100% { transform: translateY(-10vh) rotate(360deg); }
        }

        /* --- セットアップ --- */
        .setup-card { 
            background: var(--card-bg); padding: 25px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; box-sizing: border-box; 
        }
        .player-row { 
            display: flex; align-items: center; gap: 12px; padding: 12px; 
            background: #fff; border-radius: 15px; border: 2px solid #eee; margin-bottom: 10px;
        }
        .emoji-box { width: 45px; height: 45px; font-size: 1.5rem; border: none; border-radius: 10px; text-align: center; }
        .name-input { flex-grow: 1; padding: 10px; font-size: 1rem; border: 1px solid #ddd; border-radius: 8px; outline: none; }

        /* --- ゲーム画面 --- */
        .scoreboard { 
            display: flex; gap: 10px; margin-bottom: 15px; padding: 15px; 
            background: white; border-radius: 15px; width: 100%; justify-content: space-around; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); box-sizing: border-box;
        }
        .score-item { display: flex; flex-direction: column; align-items: center; font-weight: bold; }
        .crown { font-size: 1.2rem; min-height: 1.2rem; visibility: hidden; }
        .is-top .crown { visibility: visible; animation: bounceScore 0.5s infinite alternate; }
        @keyframes bounceScore { from { transform: translateY(0); } to { transform: translateY(-5px); } }

        canvas { 
            border: 6px solid #333; background: #fff; border-radius: 12px; 
            cursor: crosshair; max-width: 100%; height: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            touch-action: none;
        }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-top: 15px; }
        .p-btn { padding: 15px 5px; border: none; border-radius: 10px; color: white; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 5px; transition: 0.2s; }
        .p-btn.selected { transform: scale(1.05); outline: 4px solid #333; outline-offset: 2px; }

        .primary-btn { background: #333; color: white; border: none; padding: 18px 40px; border-radius: 50px; font-size: 1.2rem; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        
        .gm-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-top: 15px; }
        .event-btn { background: var(--event-color); padding: 15px; border-radius: 12px; color: white; border: none; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #d35400; }
        .action-btn { background: var(--action-color); padding: 15px; border-radius: 12px; color: white; border: none; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #2980b9; }
        .event-btn:active, .action-btn:active { transform: translateY(2px); box-shadow: none; }

        /* --- オーバーレイ --- */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: white; backdrop-filter: blur(5px); }
        .modal-content {
            background: white; color: #333; padding: 25px; border-radius: 20px; 
            text-align: center; width: 90%; max-width: 450px; max-height: 85vh;
            display: flex; flex-direction: column;
        }
        .grid-container {
            overflow-y: auto; display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: 10px; margin: 20px 0; padding: 5px;
        }
        .num-btn { background: #eee; border: none; padding: 15px 5px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .num-btn:hover { background: #ddd; }

        .rank-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: white; margin-bottom: 8px; border-radius: 10px; width: 280px; opacity: 0; transform: translateY(20px); }
        .animate-rank { animation: slideUp 0.5s forwards; }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

 <div id="bgParticles" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1;"></div>

<div id="startScreen" class="screen active">

        actionList[5] = { emoji: "✋", title: "パピーと手押し相撲", text: "勝ったら3マス進む！" };
        actionList[6] = { emoji: "🎤", title: "全力合唱", text: "チーム全員で好きな歌を歌えたら2マス進む！" };
        actionList[7] = { emoji: "✍️", title: "漢字博士", text: "チーム対抗漢字書き！勝利チームは2位との差分マス進む" };
        actionList[8] = { emoji: "🧠", title: "45期とテレパシット", text: "45期を1人選んでテレパシー！成功したら3マス進む" };
        actionList[9] = { emoji: "🔤", title: "略語を直すゲーム！", text: "チーム対抗戦！勝ったチームは2マス進む" };
        actionList[10] = { emoji: "🔍", title: "あゆとWhoあーゆー？", text: "チーム対抗！あゆの出すお題を当てたら2マス進む" };
        actionList[11] = { emoji: "🔴", title: "けん玉チャレンジ", text: "チャンス2回！大皿(1), 小皿(2), 中皿(3), とめけん(4)成功分進む" };
        actionList[12] = { emoji: "🙆", title: "5人ポーズチャレンジ", text: "お題に揃った人数分進む。誰も揃わなかったら5マス戻る" };
        actionList[13] = { emoji: "🖊️", title: "わかにゃん反射神経", text: "ペン落としキャッチできたら2マス進む！" };
        actionList[14] = { emoji: "👈", title: "たんたんと勝負！", text: "あっちむいてホイ！勝ったら2マス進む" };
        actionList[15] = { emoji: "🍑", title: "あたまおしりゲーム", text: "勝ったら2マス進む！" };
        actionList[16] = { emoji: "🎭", title: "チャイとはぁってゲーム", text: "回答正解で3マス進む！チャイが演じます" };
        actionList[17] = { emoji: "🤣", title: "がっきーの笑コラ", text: "がっきーを笑わせたら4マス進む！" };

        let paintedTiles = Array.from({ length: mapData.length }, () => Array(mapData[0].length).fill(0));
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const tileSize = 40;
        let currentPlayerId = 1;

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            if(screenId === 'setupScreen') initSetup();
        }

        function initSetup() {
            document.getElementById('playerInputs').innerHTML = players.map(p => `
                <div class="player-row">
                    <input type="text" class="emoji-box" style="background:${p.color}22; border:2px solid ${p.color}" value="${p.emoji}" id="emoji${p.id}" maxlength="2">
                    <input type="text" class="name-input" value="${p.name}" id="name${p.id}">
                </div>
            `).join('');
        }

        function startGame() {
            players.forEach(p => {
                p.name = document.getElementById(`name${p.id}`).value || `P${p.id}`;
                p.emoji = document.getElementById(`emoji${p.id}`).value || "👤";
            });
            initUI(); showScreen('gameScreen'); draw();
        }

        function initUI() {
            canvas.width = mapData[0].length * tileSize;
            canvas.height = mapData.length * tileSize;
            document.getElementById('scoreboardUI').innerHTML = players.map(p => `
                <div id="item${p.id}" class="score-item" style="color: ${p.color}">
                    <div class="crown">👑</div><div>${p.emoji}</div><span id="score${p.id}" style="font-size:1.4rem">0</span>
                </div>
            `).join('');
            document.getElementById('controlsUI').innerHTML = players.map(p => `
                <button id="btn${p.id}" class="p-btn ${p.id===currentPlayerId?'selected':''}" style="background:${p.color}" onclick="selectPlayer(${p.id})">
                    <span>${p.emoji}</span><span>${p.name}</span>
                </button>
            `).join('');
        }

        function selectPlayer(id) {
            currentPlayerId = id;
            document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('btn' + id).classList.add('selected');
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for(let y=0; y<mapData.length; y++){
                for(let x=0; x<mapData[y].length; x++){
                    if(mapData[y][x] === 1){
                        const pId = paintedTiles[y][x];
                        ctx.fillStyle = pId !== 0 ? players.find(p=>p.id===pId).color : "#fff";
                        ctx.fillRect(x*tileSize + 1, y*tileSize + 1, tileSize - 2, tileSize - 2);
                        ctx.strokeStyle = "#ddd"; ctx.strokeRect(x*tileSize + 1, y*tileSize + 1, tileSize - 2, tileSize - 2);
                    } else {
                        ctx.fillStyle = "#e9ecef"; ctx.fillRect(x*tileSize, y*tileSize, tileSize, tileSize);
                    }
                }
            }
        }

        function handleInteraction(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = (e.touches ? e.touches[0].clientX : e.clientX);
            const clientY = (e.touches ? e.touches[0].clientY : e.clientY);
            const x = Math.floor((clientX - rect.left) / (rect.width / mapData[0].length));
            const y = Math.floor((clientY - rect.top) / (rect.height / mapData.length));
            if(mapData[y] && mapData[y][x] === 1) {
                paintedTiles[y][x] = (paintedTiles[y][x] === currentPlayerId) ? 0 : currentPlayerId;
                draw(); updateScore();
            }
        }
        canvas.addEventListener('mousedown', handleInteraction);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInteraction(e); }, { passive: false });

        function updateScore() {
            const counts = { 1:0, 2:0, 3:0, 4:0 };
            paintedTiles.forEach(row => row.forEach(t => { if(t!==0) counts[t]++; }));
            const maxVal = Math.max(...Object.values(counts));
            players.forEach(p => {
                p.score = counts[p.id];
                document.getElementById(`score${p.id}`).innerText = p.score;
                document.getElementById(`item${p.id}`).classList.toggle('is-top', p.score === maxVal && maxVal > 0);
            });
        }

        function openMenu(type) {
            currentMenuType = type;
            const overlay = document.getElementById('selectionOverlay');
            const container = document.getElementById('gridContainer');
            const title = document.getElementById('menuTitle');
            
            title.innerText = type === 'event' ? "エピソード選択" : "アクション選択";
            title.style.color = type === 'event' ? "var(--event-color)" : "var(--action-color)";
            
            container.innerHTML = "";
            const max = (type === 'event' ? 43 : 17);
            for(let i=1; i<=max; i++) {
                const btn = document.createElement('button');
                btn.className = 'num-btn';
                btn.innerText = i;
                btn.onclick = () => showDetail(i);
                container.appendChild(btn);
            }
            overlay.style.display = 'flex';
        }

        function closeMenu() { document.getElementById('selectionOverlay').style.display = 'none'; }

        function showDetail(num) {
            const data = currentMenuType === 'event' ? eventList[num] : actionList[num];
            closeMenu();
            document.getElementById('detailEmoji').innerText = data.emoji;
            document.getElementById('detailType').innerText = (currentMenuType === 'event' ? "EPISODE" : "ACTION") + " No." + num;
            document.getElementById('detailType').style.color = currentMenuType === 'event' ? "var(--event-color)" : "var(--action-color)";
            document.getElementById('detailTitle').innerText = data.title;
            document.getElementById('detailText').innerText = data.text;
            document.getElementById('detailOverlay').style.display = 'flex';
        }

        function askConfirm() { document.getElementById('confirmOverlay').style.display='flex'; }
        function closeConfirm() { document.getElementById('confirmOverlay').style.display='none'; }
        function confirmFinish() { closeConfirm(); showResult(); }

        function showResult() {
            const sorted = [...players].sort((a,b) => b.score - a.score);
            const container = document.getElementById('rankingContainer');
            container.innerHTML = sorted.map((p, i) => `
                <div class="rank-row animate-rank" style="color:${p.color}; animation-delay:${i*0.2}s">
                    <span>${i+1}位</span><span>${p.emoji} ${p.name}</span><b>${p.score} pt</b>
                </div>
            `).join('');
            document.getElementById('resultOverlay').style.display='flex';
        }

        function createParticles() {
            const container = document.getElementById('bgParticles');
            const colors = ['#2ecc71', '#ff4757', '#a55eea', '#45aaf2'];
            for (let i = 0; i < 15; i++) {
                const div = document.createElement('div');
                div.className = 'floating-tile';
                div.style.left = Math.random() * 100 + 'vw';
                div.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                div.style.animationDuration = (Math.random() * 8 + 7) + 's';
                div.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(div);
            }
        }
        window.onload = createParticles;
    </script>
</body>
</html>
